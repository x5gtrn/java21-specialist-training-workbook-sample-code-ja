services:
  core-samples:
    build:
      context: .
      dockerfile: core-samples/Dockerfile
    image: java21stw300-core-samples:1.0.0
    container_name: java21stw300-core-samples
    ports:
      - "8080:8080"

  framework-samples:
    build:
      context: .
      dockerfile: framework-samples/Dockerfile
    image: java21stw300-framework-samples:1.0.0
    container_name: java21stw300-framework-samples
    ports:
      - "8081:8081"
