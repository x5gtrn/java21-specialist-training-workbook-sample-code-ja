server:
  port: 8081

spring:
  datasource:
    url: jdbc:h2:mem:workbook;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    # LazyInitializationException を再現するため OSIV を無効化（問題174）
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        # 発行クエリ数の計測に使用（問題176 N+1）
        generate_statistics: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org.hibernate.SQL: debug
